  <!-- mark -->
  <rect x="22" y="26" width="60" height="60" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <rect x="16" y="20" width="60" height="60" fill="#F5F5F0" stroke="#000" stroke-width="3"/>
  <rect x="26" y="30" width="40" height="10" fill="#000"/>
