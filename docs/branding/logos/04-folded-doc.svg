<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Variante 4 : document plié coin replié -->
  <rect x="0" y="0" width="100" height="100" fill="#F5F5F0"/>
  <!-- shadow document -->
  <polygon points="22,22 76,22 84,30 84,82 22,82" fill="#000"/>
  <!-- main document -->
  <polygon points="16,16 70,16 78,24 78,76 16,76" fill="#F5F5F0" stroke="#000" stroke-width="3"/>
  <!-- folded corner -->
  <polygon points="70,16 70,24 78,24" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <!-- invoice lines -->
  <rect x="22" y="32" width="40" height="3" fill="#000"/>
  <rect x="22" y="42" width="50" height="3" fill="#000"/>
  <rect x="22" y="52" width="32" height="3" fill="#000"/>
  <!-- total bar -->
  <rect x="22" y="62" width="50" height="8" fill="#FFFF00" stroke="#000" stroke-width="2"/>
</svg>
