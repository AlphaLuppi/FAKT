<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Variante 6 : grille ledger avec accent F -->
  <rect x="0" y="0" width="100" height="100" fill="#F5F5F0"/>
  <!-- shadow -->
  <rect x="20" y="20" width="64" height="64" fill="#000"/>
  <!-- main square -->
  <rect x="14" y="14" width="64" height="64" fill="#F5F5F0" stroke="#000" stroke-width="3"/>
  <!-- grid lines -->
  <line x1="14" y1="30" x2="78" y2="30" stroke="#000" stroke-width="2"/>
  <line x1="14" y1="46" x2="78" y2="46" stroke="#000" stroke-width="2"/>
  <line x1="14" y1="62" x2="78" y2="62" stroke="#000" stroke-width="2"/>
  <line x1="30" y1="14" x2="30" y2="78" stroke="#000" stroke-width="2"/>
  <line x1="46" y1="14" x2="46" y2="78" stroke="#000" stroke-width="2"/>
  <line x1="62" y1="14" x2="62" y2="78" stroke="#000" stroke-width="2"/>
  <!-- yellow F cells filled -->
  <rect x="14" y="14" width="16" height="16" fill="#FFFF00"/>
  <rect x="30" y="14" width="16" height="16" fill="#FFFF00"/>
  <rect x="46" y="14" width="16" height="16" fill="#FFFF00"/>
  <rect x="14" y="30" width="16" height="16" fill="#FFFF00"/>
  <rect x="14" y="46" width="16" height="16" fill="#000"/>
  <rect x="30" y="46" width="16" height="16" fill="#000"/>
  <rect x="14" y="62" width="16" height="16" fill="#FFFF00"/>
  <!-- redraw grid above fills -->
  <rect x="14" y="14" width="64" height="64" fill="none" stroke="#000" stroke-width="3"/>
  <line x1="14" y1="30" x2="78" y2="30" stroke="#000" stroke-width="2"/>
  <line x1="14" y1="46" x2="78" y2="46" stroke="#000" stroke-width="2"/>
  <line x1="14" y1="62" x2="78" y2="62" stroke="#000" stroke-width="2"/>
  <line x1="30" y1="14" x2="30" y2="78" stroke="#000" stroke-width="2"/>
  <line x1="46" y1="14" x2="46" y2="78" stroke="#000" stroke-width="2"/>
  <line x1="62" y1="14" x2="62" y2="78" stroke="#000" stroke-width="2"/>
</svg>
