<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Variante 8 : ticket / reçu validé -->
  <rect x="0" y="0" width="100" height="100" fill="#F5F5F0"/>
  <!-- shadow -->
  <rect x="22" y="20" width="56" height="68" fill="#000"/>
  <!-- ticket -->
  <rect x="16" y="14" width="56" height="68" fill="#F5F5F0" stroke="#000" stroke-width="3"/>
  <!-- top yellow band with FAKT -->
  <rect x="16" y="14" width="56" height="16" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <text x="44" y="26" text-anchor="middle"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="800" font-size="10" fill="#000"
        letter-spacing="3">FAKT</text>
  <!-- big checkmark -->
  <polyline points="26,54 38,66 64,40"
            fill="none" stroke="#000" stroke-width="8"
            stroke-linecap="square" stroke-linejoin="miter"/>
</svg>
