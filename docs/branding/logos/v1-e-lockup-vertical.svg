<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <!-- 1E : lockup vertical mark + wordmark -->
  <rect x="0" y="0" width="120" height="160" fill="#F5F5F0"/>
  <!-- mark -->
  <rect x="36" y="22" width="60" height="60" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <rect x="30" y="16" width="60" height="60" fill="#F5F5F0" stroke="#000" stroke-width="3"/>
  <rect x="40" y="26" width="40" height="10" fill="#000"/>
  <rect x="40" y="26" width="10" height="40" fill="#000"/>
  <rect x="40" y="44" width="28" height="8" fill="#000"/>
  <!-- wordmark -->
  <text x="60" y="118" text-anchor="middle"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="800" font-size="22" fill="#000"
        letter-spacing="6">FAKT</text>
  <!-- baseline rule -->
  <rect x="20" y="128" width="80" height="3" fill="#000"/>
  <text x="60" y="146" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-weight="700" font-size="7" fill="#000"
