name: E2E

# Déclenché uniquement sur push main (pas sur PR) pour éviter de saturer les
# runners GitHub avec les builds Tauri complets qui peuvent prendre 15-20 min.
on:
  push:
    branches: [main]

jobs:
  playwright-tauri:
    name: E2E smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            xvfb

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      # Sur Linux CI, utiliser Xvfb pour le display headless
      - name: Run E2E smoke tests (Linux headless)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run bun run test:e2e

      - name: Run E2E smoke tests
        if: matrix.os != 'ubuntu-latest'
        run: bun run test:e2e
