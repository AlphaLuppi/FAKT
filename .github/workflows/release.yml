name: Release

# Déclenché sur push d'un tag vX.Y.Z (ex : v0.1.0).
# Tom Andrieu exécute ce workflow manuellement via `git tag v0.1.0 && git push --tags`
# une fois les critères DoD v0.1.0 satisfaits (cf. CHANGELOG.md Known Issues).
on:
  push:
    tags: ["v*"]

# Minimum de permissions pour uploader les assets sur la GitHub Release.
permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            # Universal binary macOS (Intel + Apple Silicon en un seul .dmg)
            args: "--target universal-apple-darwin"
          - os: ubuntu-latest
            args: ""
          - os: windows-latest
            # WINDOWS CODE SIGNING — SKIP v0.1.0 (décision Tom Andrieu 2026-04-22)
            # Le certificat OV Authenticode n'est pas encore commandé.
            # SmartScreen affichera un avertissement "Unknown Publisher" à l'install.
            # La signature Windows sera ajoutée en v0.1.1.
            # Voir issue : .github/ISSUE_TEMPLATE/windows-codesign-v0.1.1.md
            args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary nécessite les deux targets Apple Silicon + Intel
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build sidecar api-server en Bun-compiled pour chaque target supporté.
      # `--all` compile les 4 targets (win-x64, darwin-x64, darwin-arm64, linux-x64)
      # — overhead ~2 min par runner mais garantit que tauri-action trouve toujours
      # le bon binaire selon la cible bundlée (notamment pour macOS universal qui
      # nécessite arm64 + x64 co-présents).
      - name: Build sidecar api-server (all targets)
        run: bun run packages/api-server/scripts/build-sidecar.ts --all

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── macOS signing + notarization ───────────────────────────────────────
          # Ces secrets sont à configurer dans GitHub → Settings → Secrets
          # (repository ou organisation AlphaLuppi) dès que Tom a souscrit
          # à l'Apple Developer Program.
          # Sans ces secrets : le .dmg sera créé mais non notarisé, Gatekeeper
          # affichera un avertissement. Acceptable en v0.1.0.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

          # ── Windows signing — INTENTIONNELLEMENT ABSENT v0.1.0 ────────────────
          # WINDOWS_CERTIFICATE et WINDOWS_CERTIFICATE_PASSWORD seront déclarés
          # en v0.1.1. Ne pas déclarer les secrets non-disponibles évite les
          # erreurs GitHub "secret not found".

        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FAKT ${{ github.ref_name }}"
          releaseBody: |
            Voir [CHANGELOG.md](https://github.com/AlphaLuppi/FAKT/blob/main/CHANGELOG.md)
            pour la liste exhaustive des fonctionnalités v0.1.0.

            **Note Windows :** l'installeur `.msi` n'est pas signé en v0.1.0
            (SmartScreen affichera « Unknown Publisher »). Clic droit → Exécuter quand même.
            La signature Authenticode sera ajoutée en v0.1.1.

            **Note macOS :** si Gatekeeper bloque, clic droit → Ouvrir.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          args: ${{ matrix.args }}
