name: Release

# Déclenché sur push d'un tag vX.Y.Z (ex : v0.1.0).
# Tom Andrieu exécute ce workflow manuellement via `git tag v0.1.0 && git push --tags`
# une fois les critères DoD v0.1.0 satisfaits (cf. CHANGELOG.md Known Issues).
on:
  push:
    tags: ["v*"]

# Minimum de permissions pour uploader les assets sur la GitHub Release.
permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            # Universal binary macOS (Intel + Apple Silicon en un seul .dmg)
            args: "--target universal-apple-darwin"
          - os: ubuntu-latest
            # AppImage skip en v0.1.0 : linuxdeploy AppImage nécessite FUSE absent
            # des runners GitHub Actions (APPIMAGE_EXTRACT_AND_RUN=1 ne suffit pas).
            # .deb couvre Debian/Ubuntu/Mint/Pop!_OS — majorité des users Linux desktop.
            # AppImage reviendra en v0.1.1 avec containerized build ou patch linuxdeploy.
            args: "--bundles deb"
          - os: windows-latest
            # WINDOWS CODE SIGNING — SKIP v0.1.0 (décision Tom Andrieu 2026-04-22)
            # Le certificat OV Authenticode n'est pas encore commandé.
            # SmartScreen affichera un avertissement "Unknown Publisher" à l'install.
            # La signature Windows sera ajoutée en v0.1.1.
            # Voir issue : .github/ISSUE_TEMPLATE/windows-codesign-v0.1.1.md
            args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary nécessite les deux targets Apple Silicon + Intel
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libssl-dev \
            libfuse2 \
            fuse

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build sidecar api-server pour le(s) target(s) de l'OS courant uniquement.
      # Cross-compile Bun Windows→Darwin échoue sur les runners — on build ce qui
      # est pertinent pour le bundling de chaque matrix entry.
      - name: Build sidecar (Windows x64)
        if: matrix.os == 'windows-latest'
        run: bun run packages/api-server/scripts/build-sidecar.ts --target=bun-windows-x64

      - name: Build sidecar (Linux x64)
        if: matrix.os == 'ubuntu-latest'
        run: bun run packages/api-server/scripts/build-sidecar.ts --target=bun-linux-x64

      # macOS universal-apple-darwin bundle : Tauri cherche binaries/fakt-api-universal-apple-darwin
      # (pas les 2 archs séparément). On merge les 2 binaires Bun via `lipo -create`.
      - name: Build sidecar + merge universal (macOS arm64 + x64)
        if: matrix.os == 'macos-latest'
        run: |
          bun run packages/api-server/scripts/build-sidecar.ts --target=bun-darwin-arm64
          bun run packages/api-server/scripts/build-sidecar.ts --target=bun-darwin-x64
          lipo -create \
            apps/desktop/src-tauri/binaries/fakt-api-aarch64-apple-darwin \
            apps/desktop/src-tauri/binaries/fakt-api-x86_64-apple-darwin \
            -output apps/desktop/src-tauri/binaries/fakt-api-universal-apple-darwin
          chmod +x apps/desktop/src-tauri/binaries/fakt-api-universal-apple-darwin
          ls -lh apps/desktop/src-tauri/binaries/

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # APPIMAGE_EXTRACT_AND_RUN : GitHub Actions runners n'ont pas FUSE,
          # donc linuxdeploy AppImage ne peut pas s'exécuter directement. Ce flag
          # fait extract le AppImage avant de l'exécuter (slower mais fonctionnel).
          APPIMAGE_EXTRACT_AND_RUN: 1

          # ── Tauri Updater — signature ed25519 ───────────────────────────────
          # Quand ces deux secrets sont présents + `bundle.createUpdaterArtifacts`
          # à true dans tauri.conf.json, tauri-action génère un `.sig` à côté
          # de chaque artifact updater (NSIS, .app.tar.gz, .AppImage.tar.gz, .deb)
          # et publie automatiquement `latest.json` (signature + url + version)
          # sur la GitHub Release. Le plugin updater côté app vérifie la sig
          # avec la pubkey embarquée dans le binaire (cf. tauri.conf.json).
          # Génération keypair : voir `docs/release-process.md`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── macOS signing + notarization — SKIP v0.1.0 ──────────────────────
          # Les APPLE_* secrets ne sont PAS configurés dans GitHub Secrets en v0.1.0
          # (Tom n'a pas encore souscrit Apple Developer Program). Passer des env
          # vars APPLE_* vides fait fail tauri-action à l'import keychain.
          # On ne déclare donc PAS les env APPLE_* : tauri-action skip codesign
          # silencieusement. Le .dmg produit n'est pas notarisé — Gatekeeper
          # affichera un avertissement, contournement clic droit → Ouvrir.
          # À activer en v0.1.1 dès que Tom aura configuré les secrets.

          # ── Windows signing — SKIP v0.1.0 ────────────────────────────────────
          # Certificat OV Authenticode pas encore commandé. SmartScreen affichera
          # "Unknown Publisher". Activation v0.1.1.

        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FAKT ${{ github.ref_name }}"
          releaseBody: |
            Voir [CHANGELOG.md](https://github.com/AlphaLuppi/FAKT/blob/main/CHANGELOG.md)
            pour la liste exhaustive des fonctionnalités v0.1.0.

            **Note Windows :** l'installeur `.msi` / `.exe` (NSIS) n'est pas signé
            Authenticode en v0.1.0 (SmartScreen affichera « Unknown Publisher »).
            Clic droit → Exécuter quand même. La signature Authenticode arrive en v0.1.1.

            **Note macOS :** si Gatekeeper bloque, clic droit → Ouvrir.

            **Mises à jour :** dès la prochaine release publiée, l'app détecte
            automatiquement la nouvelle version au boot et propose une bannière
            « Mise à jour disponible ». Un clic suffit pour DL + installer.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          # Génère et upload `latest.json` (signature + url + version) en asset
          # du tag GitHub Release. Le plugin updater pointe sur `.../latest/download/latest.json`
          # qui résout toujours sur la dernière release (cf. tauri.conf.json endpoints).
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
