name: Release

# Déclenché sur push d'un tag vX.Y.Z (ex : v0.1.20).
# Tom Andrieu exécute ce workflow manuellement via `git tag v0.1.X && git push --tags`.
#
# MVP cible Windows + macOS uniquement (Linux retiré post-v0.1.19).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            # Universal binary macOS (Intel + Apple Silicon en un seul .dmg)
            args: "--target universal-apple-darwin"
          - os: windows-latest
            # WINDOWS CODE SIGNING — pas encore commandé. SmartScreen affiche
            # "Unknown Publisher" à l'install. Activation prévue v0.2.x.
            args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary nécessite les deux targets Apple Silicon + Intel
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build sidecar api-server pour le(s) target(s) de l'OS courant uniquement.
      - name: Build sidecar (Windows x64)
        if: matrix.os == 'windows-latest'
        run: bun run packages/api-server/scripts/build-sidecar.ts --target=bun-windows-x64

      # macOS universal-apple-darwin bundle : Tauri cherche binaries/fakt-api-universal-apple-darwin
      # (pas les 2 archs séparément). On merge les 2 binaires Bun via `lipo -create`.
      - name: Build sidecar + merge universal (macOS arm64 + x64)
        if: matrix.os == 'macos-latest'
        run: |
          bun run packages/api-server/scripts/build-sidecar.ts --target=bun-darwin-arm64
          bun run packages/api-server/scripts/build-sidecar.ts --target=bun-darwin-x64
          lipo -create \
            apps/desktop/src-tauri/binaries/fakt-api-aarch64-apple-darwin \
            apps/desktop/src-tauri/binaries/fakt-api-x86_64-apple-darwin \
            -output apps/desktop/src-tauri/binaries/fakt-api-universal-apple-darwin
          chmod +x apps/desktop/src-tauri/binaries/fakt-api-universal-apple-darwin
          ls -lh apps/desktop/src-tauri/binaries/

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Tauri Updater — signature ed25519 ───────────────────────────────
          # Quand ces deux secrets sont présents + `bundle.createUpdaterArtifacts`
          # à true dans tauri.conf.json, tauri-action génère un `.sig` à côté
          # de chaque artifact updater (NSIS, .app.tar.gz) et publie automatiquement
          # `latest.json` (signature + url + version) sur la GitHub Release.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── macOS signing + notarization — SKIP MVP ─────────────────────────
          # Les APPLE_* secrets ne sont pas configurés (Apple Developer Program
          # pas encore souscrit). Passer des env vars APPLE_* vides fait fail
          # tauri-action à l'import keychain. On ne déclare donc PAS les env
          # APPLE_* : tauri-action skip codesign silencieusement. Le .dmg
          # produit n'est pas notarisé — Gatekeeper affichera un avertissement,
          # contournement clic droit → Ouvrir.

          # ── Windows signing — SKIP MVP ──────────────────────────────────────
          # Certificat OV Authenticode pas encore commandé. SmartScreen affichera
          # "Unknown Publisher".

        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FAKT ${{ github.ref_name }}"
          # ⚠️ Body provisoire : le mainteneur DOIT remplacer ces notes après le
          # tag via `gh release edit vX.Y.Z --notes-file <extrait CHANGELOG>`.
          # Procédure complète dans `.claude/skills/release/SKILL.md` étape 6.
          releaseBody: |
            🛠️ Notes de version en cours d'édition…

            En attendant : voir le [CHANGELOG complet](https://github.com/AlphaLuppi/FAKT/blob/main/CHANGELOG.md).
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
