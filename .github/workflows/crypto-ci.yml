# CI ciblée pour le module crypto Rust (PAdES, keychain).
#
# Tourne uniquement sur Windows + macOS — MVP cible ces 2 OS. Linux a été
# retiré post-v0.1.19 (non couvert par le MVP, et le keychain Linux nécessite
# un démon Secret Service + dbus-run-session non triviaux à orchestrer en CI).

name: crypto-ci

on:
  push:
    paths:
      - "apps/desktop/src-tauri/**"
      - ".github/workflows/crypto-ci.yml"
  pull_request:
    paths:
      - "apps/desktop/src-tauri/**"
      - ".github/workflows/crypto-ci.yml"
  workflow_dispatch:

jobs:
  crypto-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      # build.rs Tauri vérifie l'existence du sidecar binary avant cargo check
      # (externalBin dans tauri.conf.json). Sans ça, cargo check échoue.
      - name: Install monorepo deps + build sidecar
        run: |
          bun install --frozen-lockfile
          bun run packages/api-server/scripts/build-sidecar.ts

      - name: cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check --lib

      - name: cargo test (unit + integration)
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib --tests

      # Round-trip keychain effectif — Windows + macOS uniquement (Linux drop).
      - name: cargo test keychain round-trip
        working-directory: apps/desktop/src-tauri
        run: cargo test --test cert_roundtrip -- --ignored

      # Clippy en mode informationnel (pas `-D warnings`) : on signale les
      # style lints mais on ne bloque pas le release.
      - name: cargo clippy (warnings informational)
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --lib --tests
        continue-on-error: true
