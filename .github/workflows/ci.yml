name: CI

# CI principale : lint, typecheck, unit tests Vitest, Playwright dev mode,
# cargo check Rust. MVP cible Windows + macOS uniquement (cf. note dans le
# CHANGELOG v0.1.20). Linux est exclu de la matrice — les utilisateurs Linux
# attendront un effort post-MVP.

on:
  pull_request:
  push:
    branches: [main]
    tags-ignore: ["v*"]

jobs:
  lint-typecheck-test:
    name: lint · typecheck · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Lint (Biome)
        run: bun run lint

      - name: Unit tests (Vitest)
        run: bun run test

      - name: Frontend build (Vite — sans Tauri pour la vitesse CI)
        working-directory: apps/desktop
        run: bun run build

      # build.rs Tauri vérifie l'existence du binaire sidecar déclaré dans
      # tauri.conf.json bundle.externalBin AVANT cargo check. Sans ce build,
      # cargo check échoue en "resource path binaries/fakt-api-<triple> doesn't exist".
      - name: Build sidecar api-server (target natif runner)
        run: bun run packages/api-server/scripts/build-sidecar.ts

      - name: Cargo check (backend Tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked

      # ── E2E Playwright dev mode (mocked sidecar) ───────────────────────
      # Anciennement dans e2e.yml séparé — fusionné ici pour réduire le
      # nombre de workflows. La suite tourne contre Vite dev server avec
      # mocks API (~42s, indépendant du binaire packagé).
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Playwright dev mode (mocked)
        run: bun run test:e2e

      # Non-bloquant en v0.1.x — vulnérabilités hautes à vérifier manuellement
      # avant chaque release tag. Deviendra bloquant en v0.2.
      - name: Cargo audit (non-bloquant)
        working-directory: apps/desktop/src-tauri
        run: cargo install cargo-audit --quiet && cargo audit || true

      # Non-bloquant — certains packages transitifs en BETA peuvent avoir des
      # advisories. Vérification manuelle avant tag recommandée.
      - name: Bun audit (non-bloquant)
        run: bun audit || true
