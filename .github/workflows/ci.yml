name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags-ignore: ["v*"]

jobs:
  lint-typecheck-test:
    name: lint · typecheck · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libssl-dev \
            libdbus-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Lint (Biome)
        run: bun run lint

      - name: Unit tests (Vitest)
        run: bun run test

      - name: Frontend build (Vite — sans Tauri pour la vitesse CI)
        working-directory: apps/desktop
        run: bun run build

      # build.rs Tauri vérifie l'existence du binaire sidecar déclaré dans
      # tauri.conf.json bundle.externalBin AVANT cargo check. Sans ce build,
      # cargo check échoue en "resource path binaries/fakt-api-<triple> doesn't exist".
      # On compile uniquement le target natif du runner (pas --all) pour garder le job rapide.
      - name: Build sidecar api-server (target natif runner)
        run: bun run packages/api-server/scripts/build-sidecar.ts

      - name: Cargo check (backend Tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked

      # Non-bloquant en v0.1.0 — vulnérabilités hautes à vérifier manuellement
      # avant chaque release tag. Deviendra bloquant en v0.2.
      - name: Cargo audit (non-bloquant)
        working-directory: apps/desktop/src-tauri
        run: cargo install cargo-audit --quiet && cargo audit || true

      # Non-bloquant — certains packages transitifs en BETA peuvent avoir des
      # advisories. Vérification manuelle avant tag recommandée.
      - name: Bun audit (non-bloquant)
        run: bun audit || true
