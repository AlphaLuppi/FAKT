name: CI

# CI principale : lint, typecheck, unit tests Vitest, Playwright dev mode,
# cargo check Rust. MVP cible Windows + macOS uniquement (cf. note dans le
# CHANGELOG v0.1.20). Linux est exclu de la matrice — les utilisateurs Linux
# attendront un effort post-MVP.

on:
  pull_request:
  push:
    branches: [main]
    tags-ignore: ["v*"]

jobs:
  lint-typecheck-test:
    name: lint · typecheck · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Lint (Biome)
        run: bun run lint

      - name: Unit tests (Vitest)
        run: bun run test

      # Vite build est OS-indépendant (JS/HTML/CSS portables). On le lance
      # uniquement sur Windows pour économiser ~1 min sur le job macOS.
      - name: Frontend build (Vite — sans Tauri pour la vitesse CI)
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop
        run: bun run build

      # build.rs Tauri vérifie l'existence du binaire sidecar déclaré dans
      # tauri.conf.json bundle.externalBin AVANT cargo check. Sans ce build,
      # cargo check échoue en "resource path binaries/fakt-api-<triple> doesn't exist".
      - name: Build sidecar api-server (target natif runner)
        run: bun run packages/api-server/scripts/build-sidecar.ts

      - name: Cargo check (backend Tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked

      # ── E2E Playwright dev mode (mocked sidecar) ───────────────────────
      # Tests dev mode = Vite + Chromium + mocks API. Indépendants de l'OS,
      # donc lancés uniquement sur Windows pour économiser ~3 min sur macOS.
      # Le binaire packagé macOS est validé en manuel avant chaque tag.
      - name: Install Playwright browsers
        if: matrix.os == 'windows-latest'
        run: bunx playwright install --with-deps chromium

      - name: Playwright dev mode (mocked)
        if: matrix.os == 'windows-latest'
        run: bun run test:e2e

      # Audits non-bloquants. Concentrés sur le job Windows pour éviter de
      # dupliquer ~2 min sur macOS (les CVE des deps sont OS-indépendantes).
      # taiki-e/install-action télécharge un binaire pré-compilé de
      # cargo-audit (~5s) au lieu de le compiler from scratch (~2 min).
      - name: Install cargo-audit (binaire pré-compilé)
        if: matrix.os == 'windows-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Cargo audit (non-bloquant)
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop/src-tauri
        run: cargo audit || true

      - name: Bun audit (non-bloquant)
        if: matrix.os == 'windows-latest'
        run: bun audit || true
