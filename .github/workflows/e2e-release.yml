name: E2E Release Binary

# E2E sur le binaire Tauri packagé en mode release.
#
# Plateformes :
#   - Windows : pris en charge via tauri-driver + Edge WebDriver auto-téléchargé.
#   - macOS   : NON pris en charge — Apple ne fournit pas de WebDriver pour
#               WKWebView. Le binaire macOS est validé manuellement avant tag.
#   - Linux   : retiré post-v0.1.19 (hors scope MVP).
#
# ⚠️ AUTO-TRIGGER PAUSÉ (post-v0.1.20) ⚠️
# Le binaire produit par `bun tauri:build -- --no-bundle` reste sur
# `about:blank` (origin null) en CI Windows — le frontend n'est pas embed
# correctement quand on skip le bundle, donc tous les smoke tests timeout
# sur "DOM React n'a pas mount" ou "SecurityError pushState".
#
# Le binaire publié via tauri-action (release.yml) est bundlé complètement
# et fonctionne correctement — c'est purement un bug de l'infra de test
# release, pas de l'app. À reprendre en v0.2.x : soit lever le `--no-bundle`,
# soit utiliser le binaire installé depuis l'installeur NSIS.
#
# Déclenché actuellement :
#   - workflow_dispatch → debug local manuel
#   - workflow_call → consommé par release.yml (gate informatif, non bloquant)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e-release:
    name: E2E release (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # tauri-driver est un binaire CLI Rust qui wrap le binaire Tauri en
      # WebDriver server. Sur Windows, il télécharge automatiquement Edge
      # WebDriver au premier lancement.
      #
      # Cache du binaire compilé pour éviter ~3 min de `cargo install` à chaque
      # run. Key épinglée sur la version de tauri-driver (à bumper si on
      # update).
      - name: Cache tauri-driver binary
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver.exe
          key: tauri-driver-windows-2.0.5

      - name: Install tauri-driver (si cache miss)
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      # Le sidecar Bun doit être compilé pour la cible Windows avant
      # `tauri build`. Sinon `bundle.externalBin` cherche un binaire absent
      # et tauri build échoue avant même de produire le release binary.
      - name: Build sidecar (Windows x64)
        run: bun run packages/api-server/scripts/build-sidecar.ts --target=bun-windows-x64

      # Build le binaire en mode release. --no-bundle skip les installateurs
      # (.msi/.nsis) — on a juste besoin de l'exe pour les tests E2E.
      - name: Build Tauri release binary
        working-directory: apps/desktop
        run: bun run tauri:build -- --no-bundle
        env:
          CI: "true"

      - name: Run E2E release tests
        run: bun run test:e2e:release
        env:
          FAKT_E2E_DRIVER_EXTERNAL: "0"

      - name: Upload WebdriverIO logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-windows-${{ github.run_id }}
          path: |
            ./.wdio/
            ./logs/
            ./apps/desktop/src-tauri/target/release/*.log
          if-no-files-found: ignore
          retention-days: 7
