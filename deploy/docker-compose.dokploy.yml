# ============================================================================
# FAKT — Dokploy docker-compose (Traefik handles TLS + routing)
# ============================================================================
#
# Adapté pour Dokploy :
#   - Pas de Caddy (Traefik gère reverse proxy + Let's Encrypt)
#   - Pas de Postgres (géré en ressource Dokploy séparée)
#   - Réseau dokploy-network (externe, accès à la DB Dokploy)
# ============================================================================

services:
  api-server:
    build:
      context: ..
      dockerfile: packages/api-server/Dockerfile
    restart: unless-stopped
    environment:
      AUTH_MODE: jwt
      DATABASE_URL: ${DATABASE_URL}
      FAKT_JWT_SECRET: ${FAKT_JWT_SECRET:?FAKT_JWT_SECRET requis (min 32 chars)}
      BIND: "0.0.0.0"
      FAKT_API_PORT: "3001"
      FAKT_API_EXTRA_ORIGINS: "https://${FAKT_DOMAIN}"
      FAKT_SIGNED_PDFS_DIR: /var/lib/fakt/signed
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FAKT_ADMIN_TOKEN: ${FAKT_ADMIN_TOKEN:-}
    volumes:
      - signed_pdfs:/var/lib/fakt/signed
    networks:
      - dokploy-network
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web-frontend:
    build:
      context: ..
      dockerfile: apps/desktop/Dockerfile.web
      args:
        - VITE_FAKT_DEFAULT_BACKEND_URL=https://api.fakt.alphaluppi.fr
    restart: unless-stopped
    networks:
      - dokploy-network
    expose:
      - "80"

volumes:
  signed_pdfs:

networks:
  dokploy-network:
    external: true
